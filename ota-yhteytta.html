<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ota yhteyttä — Vuoreksen Peikot ry</title>
  <meta name="description" content="Ota yhteyttä Vuoreksen Peikot ry:hyn. Lähetä meille viesti tai löydä meidät somesta.">
  <meta property="og:title" content="Ota yhteyttä — Vuoreksen Peikot ry">
  <meta property="og:description" content="Ota yhteyttä Vuoreksen Peikot ry:hyn. Vastaamme viesteihin mahdollisimman pian.">
  <meta property="og:image" content="https://vuoreksenpeikot.fi/img/logo.webp">
  <meta property="og:url" content="https://vuoreksenpeikot.fi/ota-yhteytta.html">
  <meta property="og:type" content="website">
  <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" href="img/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="img/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preload" href="fonts/BebasNeue-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="nav-placeholder"></div>

  <!-- PAGE HERO -->
  <section class="page-hero">
    <div class="page-hero-bg" aria-hidden="true"></div>
    <div class="container page-hero-content">
      <h1>Ota yhteyttä</h1>
      <p>Onko sinulla kysyttävää tai ehdotuksia? Vastaamme viesteihin mahdollisimman pian.</p>
    </div>
  </section>

  <!-- YHTEYSTIEDOT + LOMAKE -->
  <section class="section section-alt">
    <div class="container">
      <div class="contact-layout">

        <!-- Yhteystiedot -->
        <div class="contact-info">
          <h2 class="section-title" style="margin-bottom:24px;">Yhteystiedot</h2>

          <div class="contact-item">
            <div class="contact-item-icon" aria-hidden="true">✉️</div>
            <div class="contact-item-text">
              <label>Sähköposti</label>
              <a href="mailto:info@vuoreksenpeikot.fi">info@vuoreksenpeikot.fi</a>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-item-icon" aria-hidden="true">🏛️</div>
            <div class="contact-item-text">
              <label>Yhdistys</label>
              <span>Vuoreksen Peikot ry</span>
            </div>
          </div>

          <div class="contact-item">
            <div class="contact-item-icon" aria-hidden="true">🔢</div>
            <div class="contact-item-text">
              <label>Y-tunnus</label>
              <span>3564515-9</span>
            </div>
          </div>

          <div>
            <p style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--gray);margin-bottom:10px;">Sosiaalinen media</p>
            <div class="social-links">
              <a href="https://www.facebook.com/vuoreksenhontsyt" target="_blank" rel="noopener" class="social-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                Facebook
              </a>
              <a href="https://www.instagram.com/vuoreksenpeikot" target="_blank" rel="noopener" class="social-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                Instagram
              </a>
            </div>
          </div>
        </div>

        <!-- Yhteydenottolomake -->
        <div id="yhteydenotto-container" class="form-section">
          <h2>Lähetä viesti</h2>
          <p>Täytä lomake ja lähetämme vastauksen sähköpostiisi.</p>

          <form id="yhteydenotto-lomake">
            <div class="form-row">
              <div class="form-group">
                <label for="nimi">Nimi *</label>
                <input type="text" id="nimi" name="nimi" placeholder="Etunimi Sukunimi" required>
              </div>
              <div class="form-group">
                <label for="email">Sähköposti *</label>
                <input type="email" id="email" name="email" placeholder="nimi@esimerkki.fi" required>
              </div>
            </div>

            <div class="form-group">
              <label for="viesti">Viesti *</label>
              <textarea id="viesti" name="viesti" placeholder="Kirjoita viestisi tähän..." required></textarea>
            </div>

            <div class="form-submit">
              <button type="submit" id="laheta-yhteydenotto-btn" class="btn btn-primary">Lähetä viesti →</button>
            </div>
          </form>
        </div>

      </div>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script data-goatcounter="https://peikot.goatcounter.com/count"
          async src="js/count.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Vaihda tähän yhteydenotto-Apps Scriptin web-appin URL julkaisun jälkeen
    // Ohjeet: apps-script/yhteydenotto.gs
    var YHTEYDENOTTO_URL = 'https://script.google.com/macros/s/AKfycbx_fWn4XDqOUID0j5BvHbJycRP-bn5nrtCTuVW__rrtwAWNbr3lDjN8rQrsXikDa8voAw/exec';

    document.getElementById('yhteydenotto-lomake').addEventListener('submit', function (e) {
      e.preventDefault();

      var btn = document.getElementById('laheta-yhteydenotto-btn');
      btn.disabled = true;
      btn.textContent = 'Lähetetään…';

      var formData = new FormData(this);

      fetch(YHTEYDENOTTO_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: new URLSearchParams(formData)
      })
        .then(function () {
          document.getElementById('yhteydenotto-container').innerHTML =
            '<div class="info-box" style="border-color:#2ecc71;background:#f0fff4;padding:24px;">' +
            '<strong>Viesti lähetetty!</strong><br>' +
            'Kiitos viestistäsi. Otamme sinuun yhteyttä mahdollisimman pian. ' +
            'Voit myös tavoittaa meidät suoraan: ' +
            '<a href="mailto:info@vuoreksenpeikot.fi">info@vuoreksenpeikot.fi</a>' +
            '</div>';
        })
        .catch(function () {
          btn.disabled = false;
          btn.textContent = 'Lähetä viesti →';
          alert('Viestin lähetyksessä tapahtui virhe. Yritä uudelleen tai ota yhteyttä osoitteeseen info@vuoreksenpeikot.fi');
        });
    });
  </script>
</body>
</html>
