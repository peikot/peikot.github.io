<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Vuoreksen Peikot ry:n tapahtumakalenteri. Tulevat pelit, turnaukset ja tapahtumat.">
  <meta property="og:title" content="Kalenteri — Vuoreksen Peikot ry">
  <meta property="og:description" content="Tulevat pelit, turnaukset ja tapahtumat.">
  <meta property="og:image" content="https://vuoreksenpeikot.fi/img/logo.webp">
  <meta property="og:image:alt" content="Vuoreksen Peikot ry:n logo">
  <meta property="og:url" content="https://vuoreksenpeikot.fi/kalenteri.html">
  <meta property="og:type" content="website">
  <link rel="icon" href="img/favicon.ico" sizes="any">
  <link rel="icon" href="img/favicon-32x32.png" type="image/png" sizes="32x32">
  <link rel="icon" href="img/favicon-16x16.png" type="image/png" sizes="16x16">
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="preload" href="fonts/BebasNeue-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="canonical" href="https://vuoreksenpeikot.fi/kalenteri.html">
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body>

  <div id="nav-placeholder"><noscript><nav class="nav" role="navigation" aria-label="Päänavigaatio"><div class="container nav-inner"><a href="index.html" class="nav-logo" aria-label="Vuoreksen Peikot etusivu"><img src="img/logo-white.webp" alt="Vuoreksen Peikot logo"></a><ul class="nav-links" style="display:flex"><li><a href="index.html">Etusivu</a></li><li><a href="kalenteri.html">Kalenteri</a></li><li><a href="liity.html">Liity</a></li><li><a href="yhteistyo.html">Yhteistyö</a></li><li><a href="ota-yhteytta.html">Ota yhteyttä</a></li></ul></div></nav></noscript></div>

  <!-- PAGE HERO -->
  <section class="page-hero" id="main-content">
    <div class="page-hero-bg" aria-hidden="true"></div>
    <div class="container page-hero-content">
      <h1>Kalenteri</h1>
      <p>Tulevat pelit, turnaukset ja tapahtumat.</p>
    </div>
  </section>

  <!-- TAPAHTUMALISTA -->
  <section class="section section-alt">
    <div class="container">
      <div class="calendar-subscribe" style="margin-bottom:24px">
        <a href="webcal://calendar.google.com/calendar/ical/info%40vuoreksenpeikot.fi/public/basic.ics" class="btn btn-primary">Tilaa kalenteri</a>
        <a href="https://calendar.google.com/calendar/embed?src=info%40vuoreksenpeikot.fi&ctz=Europe%2FHelsinki" target="_blank" rel="noopener" class="btn btn-outline-green">Avaa Google kalenterissa</a>
      </div>

      <div id="event-list">
        <div class="cal-header">
          <button class="cal-nav-btn" id="cal-prev">&#8249;</button>
          <span class="cal-month-title" id="cal-month-title"></span>
          <div class="cal-header-right">
            <button class="cal-view-toggle" id="cal-view-toggle" aria-label="Vaihda näkymää">
              <svg class="cal-toggle-icon cal-toggle-icon-agenda" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="2" y="3" width="3" height="2" rx=".5" fill="currentColor"/><rect x="7" y="3" width="11" height="2" rx=".5" fill="currentColor"/><rect x="2" y="9" width="3" height="2" rx=".5" fill="currentColor"/><rect x="7" y="9" width="11" height="2" rx=".5" fill="currentColor"/><rect x="2" y="15" width="3" height="2" rx=".5" fill="currentColor"/><rect x="7" y="15" width="11" height="2" rx=".5" fill="currentColor"/></svg>
              <svg class="cal-toggle-icon cal-toggle-icon-grid" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><rect x="2" y="2" width="7" height="7" rx="1" fill="currentColor"/><rect x="11" y="2" width="7" height="7" rx="1" fill="currentColor"/><rect x="2" y="11" width="7" height="7" rx="1" fill="currentColor"/><rect x="11" y="11" width="7" height="7" rx="1" fill="currentColor"/></svg>
            </button>
            <button class="cal-nav-btn" id="cal-next">&#8250;</button>
          </div>
        </div>
        <div class="cal-weekdays">
          <div>Ma</div><div>Ti</div><div>Ke</div><div>To</div><div>Pe</div><div>La</div><div>Su</div>
        </div>
        <div class="cal-days" id="cal-days">
          <div class="event-list-empty" style="grid-column:1/-1">Ladataan tapahtumia...</div>
        </div>
        <div class="cal-agenda" id="cal-agenda"></div>
      </div>

    </div>
  </section>

  <!-- CTA -->
  <section class="section">
    <div class="container">
      <div class="cta-banner">
        <div>
          <h3>Haluatko mukaan peleihin?</h3>
          <p>Liity jäseneksi ja hae mukaan toimintaan!</p>
        </div>
        <a href="liity.html" class="btn btn-primary">Liity jäseneksi</a>
      </div>
    </div>
  </section>

  <!-- TAPAHTUMA-MODAALI -->
  <div id="cal-modal" class="cal-modal-overlay" role="dialog" aria-modal="true">
    <div class="cal-modal-box">
      <button class="cal-modal-close" id="cal-modal-close" aria-label="Sulje">&times;</button>
      <h3 id="cal-modal-title"></h3>
      <p id="cal-modal-date" class="cal-modal-meta"></p>
      <p id="cal-modal-time" class="cal-modal-meta"></p>
      <p id="cal-modal-location" class="cal-modal-meta cal-modal-location"></p>
      <p id="cal-modal-desc" class="cal-modal-desc"></p>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script data-goatcounter="https://peikot.goatcounter.com/count"
          async src="js/count.js"></script>
  <script src="js/main.js?v=1"></script>
</body>
</html>
